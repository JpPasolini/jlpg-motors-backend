server:
  port: 8080

spring:
  application:
    name: gateway-server
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: false
      routes:
        - id: auth-service-route
          uri: https://magnificent-growth-production-259c.up.railway.app
          predicates:
            - Path=/auth-service/**
          filters:
            - StripPrefix=1

        - id: vehicle-service-get-route
          uri: https://diplomatic-reprieve-production-c2b4.up.railway.app
          predicates:
            - Path=/vehicle-service/**
            - Method=GET
          filters:
            - StripPrefix=1

        - id: vehicle-service-write-route
          uri: https://diplomatic-reprieve-production-c2b4.up.railway.app
          predicates:
            - Path=/vehicle-service/**
          filters:
            - StripPrefix=1
            - JwtAuthenticationFilter

        - id: customer-service-route
          uri: https://cheerful-adaptation-production-c669.up.railway.app
          predicates:
            - Path=/customer-service/**
          filters:
            - JwtAuthenticationFilter

eureka:
  client:
    enabled: false
