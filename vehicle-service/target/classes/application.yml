server:
  port: 8082

spring:
  application:
    name: vehicle-service
  datasource:
    url: jdbc:postgresql://localhost:5433/vehicle_db
    username: gustavo
    password: root
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/