server:
  port: 8082

spring:
  application:
    name: vehicle-service
  datasource:
    url: jdbc:postgresql://localhost:5433/vehicle_db
    username: gustavo
    password: root
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/